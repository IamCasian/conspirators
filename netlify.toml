[build]
  publish = "."

# Admin panel
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Topic pages — all served by topics/index.html
[[redirects]]
  from = "/topics/:slug/"
  to = "/topics/index.html"
  status = 200

[[redirects]]
  from = "/topics/:slug"
  to = "/topics/index.html"
  status = 200

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
