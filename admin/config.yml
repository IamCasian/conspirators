backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "encyclopedia"
    label: "Encyclopedia Data"
    editor:
      preview: false
    files:
      - file: "data/topics.json"
        label: "Topics Overview"
        name: "topics_overview"
        extension: "json"
        format: "json"
        fields:
          - label: "Topics List"
            name: "topics"
            widget: "list"
            fields:
              - label: "Topic Name"
                name: "name"
                widget: "string"
              - label: "URL Slug"
                name: "slug"
                widget: "string"
                hint: "Must be lowercase with hyphens, e.g. 'area-51'"
              - label: "Category"
                name: "tag"
                widget: "select"
                options: ["CONSPIRACIES", "POLITICS", "RELIGION", "HEALTH", "SCIENCE", "ECONOMICS", "HISTORY", "INVESTIGATION"]
              - label: "Introduction"
                name: "intro"
                widget: "text"
              - label: "Related Topics Slugs"
                name: "related"
                widget: "list"
                required: false
                field: { label: "Slug", name: "related_slug", widget: "string" }
